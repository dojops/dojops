  ---
  MEDIUM (Should Fix, Not Blocking)

  Core/SDK:
  - stripMarkdownFences misses triple-tilde fences and nested patterns
  - AgentRouter confidence formula doesn't match documentation comments
  - backupFile silently swallows disk-full errors — rollback then has no .bak
  - readExistingConfig has TOCTOU between statSync and readFileSync
  - GeminiProvider passes raw string as contents, no finishReason check
  - DevOpsAgent.run() has hardcoded system prompt with no way to override
  - CIDebugger.diagnoseMultiple is sequential, not parallel (N serial LLM calls)

  Tools:
  - HCL string values not escaped in Terraform generator (quote injection)
  - DockerComposeTool missing mkdirSync before write
  - WorkflowJobSchema rejects valid reusable workflow jobs (uses without runs-on)
  - Helm execute() only backs up values.yaml, silently overwrites 4 other chart files
  - 8 of 12 tools have no verify() (Helm, Ansible, Docker Compose, Nginx, Makefile, Prometheus, Systemd — all have verifiable
  external tools)

  Tool Registry:
  - Silent plugin load failures — no warnings surfaced to user
  - jsonSchemaToZod ignores minLength, maxLength, minimum, maximum, pattern, allOf/anyOf/oneOf/$ref
  - HCL/INI/TOML serializers are JSON stubs — silently produce wrong format

  Planner:
  - success: false conflates cascaded-skips with real task failures

  Scanner:
  - Promise.all for scanners — one unhandled throw kills entire scan
  - ShellCheck misses shebang-only scripts, doesn't search bin/, ci/, .github/scripts/
  - pip-audit hardcodes ALL findings as HIGH regardless of actual severity
  - Scanner discovery limited to 2 levels — misses deeply nested monorepos

  CLI:
  - --sbom flag missing from dojops scan --help
  - --temperature missing from global help text
  - Banner hardcodes v1.0.0 instead of reading from package.json
  - printHelp() exits with code 1 on no-arg invocation (should be 0)
  - dojops plan without --execute still calls executor.execute() — wastes LLM credits

  API/Dashboard:
  - In-memory HistoryStore and session map unbounded (OOM on long-running server)
  - Dashboard hardcodes "16 specialist agents" in HTML
  - No SECURITY.md for vulnerability disclosure process
  - No GitHub issue/PR templates

  ---
  Competitive Landscape Summary

  What DojOps Does That Nobody Else Does

  1. 12-tool, multi-domain coverage in a single CLI — competitors are single-domain (k8sgpt = K8s only, Terrateam = Terraform
  only, Pulumi AI = Pulumi only)
  2. 7-layer security model with sandboxed execution + approval workflows + hash-chained audit — no OSS competitor has this depth
  3. Plugin system with declarative manifests, JSON Schema validation, and audit enrichment
  4. 16+ specialist agents with custom agent discovery from markdown READMEs

  Critical Gaps vs Competitors

  ┌──────────────────────┬────────────────────────────────────────────────────────────────────────────┬──────────────────────┐
  │         Gap          │                            What Competitors Do                             │       Priority       │
  ├──────────────────────┼────────────────────────────────────────────────────────────────────────────┼──────────────────────┤
  │ No MCP server        │ Pulumi, Terraform, env0 all ship MCP servers for Claude                    │ v1.1 — high impact   │
  │                      │ Code/Cursor/Copilot integration                                            │                      │
  ├──────────────────────┼────────────────────────────────────────────────────────────────────────────┼──────────────────────┤
  │ No cloud state       │ k8sgpt reads live clusters, Terrateam runs real terraform plan, env0       │ v1.1 — dojops state  │
  │ awareness            │ detects drift against actual state                                         │ wrapper              │
  ├──────────────────────┼────────────────────────────────────────────────────────────────────────────┼──────────────────────┤
  │ No GitOps/PR         │ Terrateam, Spacelift, env0 are PR-native with plan-as-comment              │ v1.1 — GitHub Action │
  │ integration          │                                                                            │                      │
  ├──────────────────────┼────────────────────────────────────────────────────────────────────────────┼──────────────────────┤
  │ No cost estimation   │ Terrateam, Spacelift, Pulumi have Infracost-like integration               │ v1.2                 │
  ├──────────────────────┼────────────────────────────────────────────────────────────────────────────┼──────────────────────┤
  │ No policy-as-code    │ Spacelift, Terrateam support OPA/Rego                                      │ v1.2                 │
  └──────────────────────┴────────────────────────────────────────────────────────────────────────────┴──────────────────────┘

  ---
  Must-Do Before v1.0.0 Launch

  Technical Fixes (the CRITICALs + key HIGHs)

  1. Fix the 4 CRITICAL bugs (null guards, atomic writes, empty choices)
  2. Add null check + parseAndValidate fallback to all tool generators
  3. Fix scanTrivySbom wrong subcommand
  4. Add helmet() and basic rate limiting to the API
  5. Resolve the DEFAULT_POLICY contradictions

  OSS Essentials

  6. Record a 30-second terminal demo GIF (asciinema/vhs) — put it at the top of README
  7. Create CHANGELOG.md with v1.0.0 entry
  8. Create CODE_OF_CONDUCT.md and SECURITY.md
  9. Fix GitHub URL inconsistency (pick one canonical URL)
  10. Fix LICENSE copyright to "DojOps Contributors"
  11. Update test count in README/docs (922 -> current)
  12. Pin trivy-action to a specific version in CI

  First-Week Post-Launch

  13. Create examples/ directory with 3-4 real-world patterns
  14. Add GitHub issue templates (bug report, feature request)
  15. Create an Ollama-first quickstart (zero API key barrier for evaluation)

  v1.1 Roadmap (Strategic)

  16. Ship @dojops/mcp package for AI assistant integration
  17. Ship a dojops-action GitHub Action for PR plan comments
  18. Add dojops state wrapping terraform show / kubectl get / helm list
  19. Add OpenTofu support alongside Terraform

  ---
  The bottom line: DojOps has genuine technical depth that competitors lack. The challenge isn't building more features — it's
  making the existing features visible, safe, and easy to try. Fix the bugs, add the demo GIF, ship the OSS essentials, and this
  is a compelling v1.0.0. DojOps v1.0.0 Release Readiness Report

