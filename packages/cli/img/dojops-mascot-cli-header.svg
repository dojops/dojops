<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 12" width="32" height="24">
  <!-- Helmet -->
  <rect x="4" y="0" width="8" height="1" fill="#e8e8e8"/>
  <rect x="3" y="1" width="10" height="1" fill="#f5f5f5"/>
  <rect x="3" y="2" width="10" height="2" fill="#ffffff"/>
  <rect x="4" y="4" width="8" height="1" fill="#f0f0f0"/>

  <!-- Antennae -->
  <rect x="1" y="1" width="1" height="4" fill="#0066cc"/>
  <rect x="14" y="1" width="1" height="4" fill="#0066cc"/>
  <rect x="1" y="2" width="1" height="1" fill="#00ccff"/>
  <rect x="14" y="2" width="1" height="1" fill="#00ccff"/>

  <!-- Side Accents -->
  <rect x="2" y="2" width="1" height="3" fill="#0066cc"/>
  <rect x="13" y="2" width="1" height="3" fill="#0066cc"/>

  <!-- Visor -->
  <rect x="3" y="5" width="10" height="3" fill="#003366"/>
  <rect x="4" y="6" width="3" height="1" fill="#00ccff"/>
  <rect x="9" y="6" width="3" height="1" fill="#00ccff"/>

  <!-- Collar -->
  <rect x="2" y="8" width="12" height="1" fill="#004499"/>
  <rect x="3" y="9" width="10" height="1" fill="#0066cc"/>
  <rect x="4" y="10" width="8" height="1" fill="#0099ff"/>
  <rect x="5" y="11" width="6" height="1" fill="#00ccff"/>
</svg>
