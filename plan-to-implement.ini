│ ---                                                                                                                           │
│ Key Design Decisions                                                                                                          │
│                                                                                                                               │
│ - Opt-in --verify: Verification needs external tools + network (terraform init). Default unchanged — no surprise slowdowns.   │
│ - Graceful fallback: Missing binary → passed with warning, never blocks.                                                      │
│ - verify() gets data not input: Validates generated output (HCL, Dockerfile, YAML), not user input.                           │
│ - SafeExecutor placement: generate → verify → approve → execute. Catches errors before files are written.                     │
│ - No new npm deps: Uses execFileSync with system/sandbox binaries.                                                            │
│ - Backward compatible: verify() optional on interface. All existing tests and tools unaffected.                               │
│ - skipVerification defaults true: Must explicitly opt in with --verify. Enterprise users can set it in policy config.         │
│                                                                                                                               │
