│ New Types in @odaops/sdk (packages/sdk/src/tool.ts)                                                                           │
│                                                                                                                               │
│ export interface VerificationIssue {                                                                                          │
│   severity: "error" | "warning" | "info";                                                                                     │
│   message: string;                                                                                                            │
│   line?: number;                                                                                                              │
│   rule?: string;                                                                                                              │
│ }                                                                                                                             │
│                                                                                                                               │
│ export interface VerificationResult {                                                                                         │
│   passed: boolean;                                                                                                            │
│   tool: string;            // e.g. "terraform validate", "hadolint"                                                           │
│   issues: VerificationIssue[];                                                                                                │
│   rawOutput?: string;                                                                                                         │
│ }                                                                                                                             │
