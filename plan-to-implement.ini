│                                                                                                                               │
│ Plan: Deep Verification Pipeline (3 Validators)                                                                               │
│                                                                                                                               │
│ Context                                                                                                                       │
│                                                                                                                               │
│ ODA generates infrastructure configs (HCL, Dockerfiles, K8s YAML) via LLM, but never validates them with the actual tools.    │
│ The tool sandbox (~/.oda/tools/) now provides terraform, kubectl, and hadolint — but nothing calls them against generated     │
│ output. This plan adds an optional verify() method to the tool SDK and implements 3 validators: Terraform, Dockerfile         │
│ (hadolint), and Kubernetes. Verification is wired into the SafeExecutor pipeline (after generate, before approval/execute)    │
│ and exposed via oda apply --verify.                                                                                           │
│                                                                                                                               │
