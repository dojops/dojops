 Plan to implement                                                                                                             │
│                                                                                                                               │
│ Rename "Plugin" → "Tool" + System Binary Sandbox "Tools" → "Toolchain"                                                        │
│                                                                                                                               │
│ Context                                                                                                                       │
│                                                                                                                               │
│ DojOps has a plugin system for declarative manifest-based tools and a system binary sandbox. Preparing for a future tools     │
│ marketplace, we need to:                                                                                                      │
│ 1. Rename "plugin" to "tool" everywhere — marketplace/custom tools should be first-class, not "add-ons"                       │
│ 2. Rename system binary sandbox from "tools" to "toolchain" — binaries (terraform, kubectl) that power the tools              │
│ 3. Ensure local tool loading works — dojops tools load <path> to import a tool from any local directory                       │
│ 4. Free up ~/.dojops/tools/ for manifest-based tools by moving binaries to ~/.dojops/toolchain/                               │
