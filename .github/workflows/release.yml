name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 8.15.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:coverage
      - run: pnpm lint

      - name: Validate package versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"
          MISMATCH=0
          for pkg in packages/*/package.json; do
            PKG_NAME=$(node -p "require('./$pkg').name")
            PKG_VERSION=$(node -p "require('./$pkg').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::$PKG_NAME has version $PKG_VERSION, expected $TAG_VERSION"
              MISMATCH=1
            fi
          done
          if [ "$MISMATCH" -eq 1 ]; then
            echo "::error::Package version mismatch. All packages must match the git tag."
            exit 1
          fi
          echo "All packages match tag version $TAG_VERSION"

      - name: Publish packages
        run: pnpm publish-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate checksums
        run: |
          mkdir -p checksums
          for pkg in packages/*/; do
            PKG_NAME=$(node -p "require('./${pkg}package.json').name" 2>/dev/null) || continue
            (cd "$pkg" && npm pack --pack-destination ../../checksums 2>/dev/null) || true
          done
          cd checksums
          sha256sum *.tgz > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \\[$VERSION\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          files: checksums/SHA256SUMS.txt

  docker:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/dojops/dojops:latest
            ghcr.io/dojops/dojops:${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=DojOps
            org.opencontainers.image.description=AI DevOps Automation Engine
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/dojops/dojops
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max
